name: Keep Render Alive

on:
  schedule:
    # Runs every 10 minutes to prevent the 15-minute sleep
    - cron: '*/10 * * * *'
  workflow_dispatch: # Allows you to run it manually from the Actions tab if needed

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render Backend
        run: curl -s -o /dev/null -w "%{http_code}" https://agentic-ai-56tq.onrender.com/
