<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AURA | Autonomous Negotiation</title>
    <!-- Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        void: '#050505',
                        accent: '#ccff00',
                        glass: 'rgba(255, 255, 255, 0.05)',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    animation: {
                        'slideUp': 'slideUp 0.6s ease-out forwards',
                        'fadeIn': 'fadeIn 0.5s ease-out forwards',
                        'scaleIn': 'scaleIn 0.4s ease-out forwards',
                        'pulse-glow': 'pulse-glow 2s ease-in-out infinite',
                        'spin-slow': 'spin 3s linear infinite',
                    },
                    keyframes: {
                        slideUp: {
                            '0%': { transform: 'translateY(20px)', opacity: '0' },
                            '100%': { transform: 'translateY(0)', opacity: '1' }
                        },
                        fadeIn: {
                            '0%': { opacity: '0' },
                            '100%': { opacity: '1' }
                        },
                        scaleIn: {
                            '0%': { transform: 'scale(0.9)', opacity: '0' },
                            '100%': { transform: 'scale(1)', opacity: '1' }
                        },
                        'pulse-glow': {
                            '0%, 100%': { boxShadow: '0 0 20px rgba(204, 255, 0, 0.3)' },
                            '50%': { boxShadow: '0 0 40px rgba(204, 255, 0, 0.6)' }
                        }
                    }
                }
            }
        }
    </script>
    <style>
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: #050505;
        }

        ::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 3px;
        }

        .bg-grid-pattern {
            background-image: linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            mask-image: linear-gradient(to bottom, transparent, black, transparent);
        }

        #spotlight {
            background: radial-gradient(circle at center, rgba(204, 255, 0, 0.06) 0%, rgba(60, 60, 255, 0.03) 30%, transparent 70%);
        }

        .loader-exit {
            opacity: 0;
            transform: scale(1.1);
            filter: blur(20px);
            pointer-events: none;
        }

        input:-webkit-autofill {
            -webkit-text-fill-color: white;
            -webkit-box-shadow: 0 0 0px 1000px #0a0a0a inset;
        }

        /* Enhanced Product Card Hover Effects */
        .product-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .product-card:hover {
            transform: translateY(-4px);
        }

        /* Animated Gradient Border */
        @keyframes border-glow {

            0%,
            100% {
                border-color: rgba(204, 255, 0, 0.3);
            }

            50% {
                border-color: rgba(204, 255, 0, 0.7);
            }
        }

        .animated-border {
            animation: border-glow 3s ease-in-out infinite;
        }

        /* Loading Animation Enhancements */
        .scanner-ring {
            animation: scan-pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        @keyframes scan-pulse {

            0%,
            100% {
                transform: scale(1);
                opacity: 1;
            }

            50% {
                transform: scale(1.1);
                opacity: 0.6;
            }
        }

        /* Chat Message Animation */
        .chat-message {
            animation: slideUp 0.4s ease-out;
        }

        /* Round Badge Glow */
        .round-badge {
            animation: pulse-glow 2s ease-in-out infinite;
        }
    </style>
</head>

<body class="bg-void text-white min-h-screen overflow-x-hidden selection:bg-accent selection:text-black">

    <!-- LOADER -->
    <div id="loader"
        class="fixed inset-0 z-[100] bg-void flex flex-col items-center justify-center transition-all duration-1000 ease-out">
        <div class="absolute inset-0 bg-grid-pattern opacity-20"></div>
        <div class="relative z-10 flex flex-col items-center font-mono">
            <div class="relative">
                <span id="progress-text"
                    class="text-8xl md:text-9xl font-bold tracking-tighter text-transparent bg-clip-text bg-gradient-to-b from-white to-gray-700">0</span>
                <span class="absolute top-2 -right-8 text-2xl text-accent opacity-80">%</span>
            </div>
            <div class="w-64 h-[2px] bg-white/10 mt-8 relative overflow-hidden rounded-full">
                <div id="progress-bar"
                    class="absolute inset-0 bg-accent shadow-[0_0_15px_#ccff00] w-0 transition-all duration-100 ease-linear">
                </div>
            </div>
            <div class="mt-6 flex items-center gap-3 text-xs tracking-[0.2em] text-gray-500 uppercase">
                <i class="fas fa-circle-notch fa-spin text-accent"></i>
                <span id="boot-log">INITIALIZING KERNEL...</span>
            </div>
        </div>
    </div>

    <!-- MAIN APP -->
    <div id="app-content" class="opacity-0 transition-opacity duration-1000 relative z-10">

        <div id="spotlight"
            class="fixed w-[1000px] h-[1000px] rounded-full pointer-events-none -translate-x-1/2 -translate-y-1/2 transition-transform duration-75 ease-out z-0 top-0 left-0">
        </div>
        <div
            class="fixed inset-0 opacity-10 bg-[linear-gradient(rgba(255,255,255,0.1)_1px,transparent_1px),linear-gradient(90deg,rgba(255,255,255,0.1)_1px,transparent_1px)] bg-[size:80px_80px] [transform:perspective(1000px)_rotateX(20deg)_scale(1.2)] origin-top pointer-events-none z-0">
        </div>

        <nav
            class="fixed top-0 w-full px-8 py-6 flex justify-between items-center z-50 backdrop-blur-md border-b border-white/5">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 bg-white text-black rounded-lg flex items-center justify-center font-bold text-lg">A
                </div>
                <span class="font-bold tracking-tight text-xl">AURA<span class="text-accent">.</span></span>
            </div>
            <div class="px-3 py-1 rounded-full bg-white/5 border border-white/10 flex items-center gap-2">
                <span class="relative flex h-2 w-2">
                    <span
                        class="animate-ping absolute inline-flex h-full w-full rounded-full bg-accent opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-2 w-2 bg-accent"></span>
                </span>
                <span class="text-[10px] font-mono tracking-widest text-accent">ONLINE</span>
            </div>
        </nav>

        <main class="min-h-screen flex flex-col items-center justify-center pt-20 px-4 relative z-10">

            <div class="text-center mb-16 space-y-6">
                <div
                    class="inline-flex items-center gap-2 px-3 py-1 rounded-full border border-white/10 bg-white/5 backdrop-blur-sm animate-[slideUp_0.6s]">
                    <i class="fas fa-bolt text-accent text-xs"></i>
                    <span class="text-[10px] uppercase tracking-[0.2em] text-gray-400 font-mono">Autonomous Negotiation
                        v2.0</span>
                </div>
                <h1
                    class="text-5xl md:text-8xl font-black tracking-tighter leading-[0.9] text-white animate-[slideUp_0.8s_0.2s_both]">
                    Negotiate <br class="hidden md:block" /> Like a Pro.</h1>
            </div>

            <!-- COMMAND DECK -->
            <form id="negotiation-form" class="w-full max-w-5xl mx-auto animate-[slideUp_0.8s_0.4s_both]">
                <div
                    class="relative group bg-[#0a0a0a]/80 border border-white/10 backdrop-blur-2xl rounded-3xl p-3 shadow-2xl transition-all duration-500 hover:border-white/20 hover:shadow-[0_0_50px_rgba(255,255,255,0.05)]">

                    <div class="flex flex-col md:flex-row gap-3">
                        <div
                            class="flex-1 relative bg-white/5 rounded-2xl group/input transition-all duration-300 focus-within:bg-white/10 focus-within:ring-1 focus-within:ring-accent/50 focus-within:shadow-[0_0_20px_rgba(204,255,0,0.1)]">
                            <label
                                class="absolute top-4 left-5 text-[10px] font-bold text-gray-500 uppercase tracking-widest flex items-center gap-2 group-focus-within/input:text-accent transition-colors">
                                <i class="fas fa-search"></i> Acquire
                            </label>
                            <input type="text" id="query" placeholder="Product Name..."
                                class="w-full h-24 pt-8 px-5 bg-transparent border-none outline-none text-xl font-medium placeholder-gray-600 text-white"
                                required autocomplete="off">
                        </div>

                        <div
                            class="flex-1 relative bg-white/5 rounded-2xl group/input transition-all duration-300 focus-within:bg-white/10 focus-within:ring-1 focus-within:ring-accent/50 focus-within:shadow-[0_0_20px_rgba(204,255,0,0.1)]">
                            <label
                                class="absolute top-4 left-5 text-[10px] font-bold text-gray-500 uppercase tracking-widest flex items-center gap-2 group-focus-within/input:text-accent transition-colors">
                                <i class="fas fa-microchip"></i> Specs
                            </label>
                            <input type="text" id="specs" placeholder="Core features..."
                                class="w-full h-24 pt-8 px-5 bg-transparent border-none outline-none text-xl font-medium placeholder-gray-600 text-white"
                                autocomplete="off">
                        </div>

                        <div
                            class="w-full md:w-48 relative bg-white/5 rounded-2xl group/input transition-all duration-300 focus-within:bg-white/10 focus-within:ring-1 focus-within:ring-accent/50 focus-within:shadow-[0_0_20px_rgba(204,255,0,0.1)]">
                            <label
                                class="absolute top-4 left-5 text-[10px] font-bold text-gray-500 uppercase tracking-widest flex items-center gap-2 group-focus-within/input:text-accent transition-colors">
                                <i class="fas fa-tag"></i> Max
                            </label>
                            <input type="number" id="budget" placeholder="Rs."
                                class="w-full h-24 pt-8 px-5 bg-transparent border-none outline-none text-xl font-medium placeholder-gray-600 text-white"
                                required>
                        </div>

                        <button type="submit"
                            class="w-full md:w-auto px-10 h-24 bg-accent hover:bg-[#bbe300] text-black rounded-2xl font-bold text-lg tracking-tight flex items-center justify-center gap-3 transition-all duration-300 shadow-[0_0_20px_rgba(204,255,0,0.2)] hover:shadow-[0_0_40px_rgba(204,255,0,0.5)] group/btn">
                            INITIATE
                            <i class="fas fa-arrow-right group-hover/btn:translate-x-1 transition-transform"></i>
                        </button>
                    </div>

                    <!-- SOURCE TOGGLES -->
                    <div class="flex flex-wrap items-center gap-3 px-4 py-4 mt-1">
                        <div class="text-[10px] text-gray-500 font-mono uppercase tracking-widest mr-2">Target Nodes:
                        </div>

                        <div id="src-amazon"
                            class="flex items-center gap-2 px-4 py-2.5 rounded-full border border-accent/50 bg-accent text-black text-xs font-bold uppercase tracking-wider cursor-pointer transition-all duration-200 shadow-[0_0_15px_rgba(204,255,0,0.3)] select-none hover:scale-105"
                            onclick="toggleSource('amazon')">
                            <i class="fab fa-amazon"></i> Amazon
                        </div>
                        <div id="src-flipkart"
                            class="flex items-center gap-2 px-4 py-2.5 rounded-full border border-accent/50 bg-accent text-black text-xs font-bold uppercase tracking-wider cursor-pointer transition-all duration-200 shadow-[0_0_15px_rgba(204,255,0,0.3)] select-none hover:scale-105"
                            onclick="toggleSource('flipkart')">
                            <i class="fas fa-shopping-bag"></i> Flipkart
                        </div>
                        <div id="src-web"
                            class="flex items-center gap-2 px-4 py-2.5 rounded-full border border-white/10 bg-white/5 text-gray-400 text-xs font-bold uppercase tracking-wider cursor-pointer transition-all duration-200 select-none hover:bg-white/10 hover:text-white hover:border-white/20"
                            onclick="toggleSource('web')">
                            <i class="fas fa-globe"></i> Web
                        </div>
                    </div>

                    <div class="hidden md:flex items-center justify-between px-4 py-2 mt-2 border-t border-white/5">
                        <span class="text-[10px] text-gray-500 font-mono">SYSTEM READY // V2.5.0</span>
                        <div class="flex gap-2 items-center">
                            <div class="h-[1px] w-12 bg-white/10"></div>
                            <div class="text-[10px] font-mono tracking-widest text-accent">AURA_CORE</div>
                        </div>
                    </div>
                </div>
            </form>

            <!-- ENHANCED SCANNER UI -->
            <div id="scanner-ui" class="hidden mt-20 text-center">
                <div class="relative w-32 h-32 mx-auto mb-8">
                    <!-- Outer rotating ring -->
                    <div
                        class="absolute inset-0 border-4 border-transparent border-t-accent border-r-accent rounded-full animate-spin">
                    </div>
                    <!-- Middle pulsing ring -->
                    <div class="absolute inset-3 border-2 border-accent/30 rounded-full scanner-ring"></div>
                    <!-- Inner glow -->
                    <div class="absolute inset-6 bg-accent/10 rounded-full flex items-center justify-center">
                        <i class="fas fa-search text-accent text-3xl animate-pulse"></i>
                    </div>
                </div>
                <div class="text-sm font-mono tracking-[0.2em] text-gray-400 mb-2">SCANNING GLOBAL INVENTORY</div>
                <div class="flex items-center justify-center gap-2">
                    <div class="w-2 h-2 bg-accent rounded-full animate-bounce" style="animation-delay: 0ms"></div>
                    <div class="w-2 h-2 bg-accent rounded-full animate-bounce" style="animation-delay: 150ms"></div>
                    <div class="w-2 h-2 bg-accent rounded-full animate-bounce" style="animation-delay: 300ms"></div>
                </div>
            </div>

            <!-- RESULTS SECTION -->
            <div id="results-feed" class="hidden w-full max-w-6xl mt-12 pb-20 space-y-8">

                <!-- ENHANCED PRODUCT GRID -->
                <div id="products-section" class="hidden animate-fadeIn">
                    <div class="flex items-center justify-between mb-6">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 bg-accent/20 rounded-lg flex items-center justify-center">
                                <i class="fas fa-box text-accent"></i>
                            </div>
                            <div>
                                <div class="text-xs uppercase tracking-widest text-gray-500">Products Found</div>
                                <div id="product-count" class="text-xl font-bold text-white">0 items</div>
                            </div>
                        </div>
                    </div>
                    <div id="products-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                        <!-- Products will be injected here -->
                    </div>
                </div>

                <!-- NEGOTIATION CHAT -->
                <div id="chat-section" class="hidden animate-fadeIn">
                    <div class="flex items-center gap-3 mb-6">
                        <div class="w-10 h-10 bg-blue-500/20 rounded-lg flex items-center justify-center">
                            <i class="fas fa-comments text-blue-400"></i>
                        </div>
                        <div>
                            <div class="text-xs uppercase tracking-widest text-gray-500">Live Negotiation</div>
                            <div class="text-xl font-bold text-white">Autonomous Agents</div>
                        </div>
                    </div>
                    <div id="chat-container"
                        class="bg-black/40 border border-white/10 rounded-2xl p-6 max-h-[600px] overflow-y-auto space-y-4">
                        <!-- Chat messages will be injected here -->
                    </div>
                </div>

                <!--JUDGE VERDICT -->
                <div id="judge-section" class="hidden animate-fadeIn">
                    <div class="flex items-center gap-3 mb-6">
                        <div class="w-10 h-10 bg-accent/20 rounded-lg flex items-center justify-center">
                            <i class="fas fa-gavel text-accent"></i>
                        </div>
                        <div>
                            <div class="text-xs uppercase tracking-widest text-gray-500">AI Analysis</div>
                            <div class="text-xl font-bold text-white">LLM Judge Verdict</div>
                        </div>
                    </div>
                    <div id="judge-container"
                        class="bg-gradient-to-br from-accent/10 to-transparent border border-accent/30 rounded-2xl p-8">
                        <!-- Judge verdict will be injected here -->
                    </div>
                </div>

                <!-- FINAL DEAL -->
                <div id="deal-section" class="hidden animate-scaleIn">
                    <div id="deal-container"
                        class="bg-gradient-to-br from-white/5 to-transparent border-2 border-accent/50 rounded-3xl p-12 text-center animated-border">
                        <!-- Final deal will be injected here -->
                    </div>
                </div>

            </div>
        </main>
    </div>

    <script>
        // --- SOURCE TOGGLE LOGIC ---
        const activeSources = new Set(['amazon', 'flipkart']);

        const activeClasses = 'border-accent/50 bg-accent text-black shadow-[0_0_15px_rgba(204,255,0,0.3)]';
        const inactiveClasses = 'border-white/10 bg-white/5 text-gray-400';

        function toggleSource(source) {
            const el = document.getElementById('src-' + source);

            if (activeSources.has(source)) {
                activeSources.delete(source);
                el.classList.remove('border-accent/50', 'bg-accent', 'text-black', 'shadow-[0_0_15px_rgba(204,255,0,0.3)]');
                el.classList.add('border-white/10', 'bg-white/5', 'text-gray-400');
            } else {
                activeSources.add(source);
                el.classList.remove('border-white/10', 'bg-white/5', 'text-gray-400');
                el.classList.add('border-accent/50', 'bg-accent', 'text-black', 'shadow-[0_0_15px_rgba(204,255,0,0.3)]');
            }
        }

        // --- LOADER ---
        const loader = document.getElementById('loader');
        const progressText = document.getElementById('progress-text');
        const progressBar = document.getElementById('progress-bar');
        const bootLog = document.getElementById('boot-log');
        const appContent = document.getElementById('app-content');

        let progress = 0;
        let interval = setInterval(() => {
            progress += 5 + Math.random() * 8;
            if (progress > 100) progress = 100;
            progressText.innerText = Math.round(progress);
            progressBar.style.width = `${progress}%`;

            if (progress >= 100) {
                clearInterval(interval);
                setTimeout(() => {
                    loader.classList.add('loader-exit');
                    appContent.classList.remove('opacity-0');
                    setTimeout(() => loader.style.display = 'none', 600);
                }, 200);
            }
        }, 50);

        // --- MOUSE SPOTLIGHT ---
        document.addEventListener('mousemove', (e) => {
            const spot = document.getElementById('spotlight');
            spot.style.left = `${e.clientX}px`;
            spot.style.top = `${e.clientY}px`;
        });

        // --- FORM ---
        const form = document.getElementById('negotiation-form');
        const scannerUi = document.getElementById('scanner-ui');
        const resultsFeed = document.getElementById('results-feed');

        // Section references
        const productsSection = document.getElementById('products-section');
        const productsGrid = document.getElementById('products-grid');
        const productCount = document.getElementById('product-count');
        const chatSection = document.getElementById('chat-section');
        const chatContainer = document.getElementById('chat-container');
        const judgeSection = document.getElementById('judge-section');
        const judgeContainer = document.getElementById('judge-container');
        const dealSection = document.getElementById('deal-section');
        const dealContainer = document.getElementById('deal-container');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            form.style.opacity = '0.5';
            form.style.pointerEvents = 'none';
            scannerUi.classList.remove('hidden');

            // Reset sections
            productsGrid.innerHTML = '';
            chatContainer.innerHTML = '';
            judgeContainer.innerHTML = '';
            dealContainer.innerHTML = '';

            const query = document.getElementById('query').value;
            const specs = document.getElementById('specs').value;
            const budget = document.getElementById('budget').value;

            try {
                const res = await fetch('/search', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        query, specs, budget,
                        sources: Array.from(activeSources),
                        max_results: 5
                    })
                });
                const data = await res.json();

                scannerUi.classList.add('hidden');
                resultsFeed.classList.remove('hidden');

                if (data.products && data.products.length > 0) {
                    // SHOW PRODUCTS GRID
                    displayProducts(data.products);

                    // START NEGOTIATION
                    startStream(data.products, query, budget);
                } else {
                    addChat('system', 'No products found. Try a different search.');
                    chatSection.classList.remove('hidden');
                    setTimeout(() => location.reload(), 3000);
                }
            } catch (e) { console.error(e); alert("Connection lost. Refreshing..."); location.reload(); }
        });

        function displayProducts(products) {
            productsSection.classList.remove('hidden');
            productCount.textContent = `${products.length} items`;

            products.forEach((p, i) => {
                const name = p.name || p.title || 'Unknown';
                const price = p.price || 0;
                const source = p.source || 'web';
                const rating = p.rating || 4.0;
                const url = p.url || '#';
                const isBestValue = p.is_best_value || false;

                const sourceColors = {
                    'amazon': 'bg-orange-500/20 text-orange-400 border-orange-500/40',
                    'flipkart': 'bg-yellow-500/20 text-yellow-400 border-yellow-500/40',
                    'myntra': 'bg-pink-500/20 text-pink-400 border-pink-500/40',
                    'web': 'bg-blue-500/20 text-blue-400 border-blue-500/40'
                };
                const sourceClass = sourceColors[source] || sourceColors['web'];

                const card = document.createElement('a');
                card.href = url;
                card.target = '_blank';
                card.className = `product-card block bg-gradient-to-br from-white/5 to-white/[0.02] border ${isBestValue ? 'border-accent/50 shadow-[0_0_30px_rgba(204,255,0,0.2)]' : 'border-white/10'} rounded-2xl p-6 hover:border-accent/30 transition-all duration-300 group relative overflow-hidden`;
                card.style.animationDelay = `${i * 100}ms`;
                card.classList.add('animate-scaleIn');

                card.innerHTML = `
                    ${isBestValue ? '<div class="absolute top-3 right-3 w-8 h-8 bg-accent rounded-full flex items-center justify-center"><i class="fas fa-star text-black text-sm"></i></div>' : ''}
                    <div class="flex items-center justify-between gap-2 mb-4">
                        <span class="px-3 py-1 text-[10px] font-bold uppercase rounded-full border ${sourceClass}">${source}</span>
                        <div class="flex items-center gap-1">
                            <i class="fas fa-star text-accent text-xs"></i>
                            <span class="text-xs text-gray-400">${rating.toFixed(1)}</span>
                        </div>
                    </div>
                    <div class="text-base text-white font-medium mb-3 line-clamp-2 group-hover:text-accent transition-colors leading-snug">${name}</div>
                    <div class="flex items-end justify-between mt-auto">
                        <div>
                            <div class="text-xs text-gray-500 mb-1">Price</div>
                            <div class="text-2xl font-bold text-accent">Rs.${price.toLocaleString()}</div>
                        </div>
                        <div class="w-10 h-10 rounded-full bg-white/5 group-hover:bg-accent/20 border border-white/10 group-hover:border-accent/50 flex items-center justify-center transition-all">
                            <i class="fas fa-arrow-right text-gray-500 group-hover:text-accent text-sm transition-colors"></i>
                        </div>
                    </div>
                `;
                productsGrid.appendChild(card);
            });
        }

        function addChat(role, message, round = null) {
            chatSection.classList.remove('hidden');

            const bubble = document.createElement('div');
            bubble.className = 'chat-message';

            if (role === 'seller') {
                bubble.className += ' flex justify-start';
                bubble.innerHTML = `
                    <div class="max-w-[80%] bg-gradient-to-br from-orange-500/10 to-orange-500/5 border border-orange-500/20 rounded-2xl rounded-tl-sm p-5">
                        <div class="flex items-center gap-2 mb-3">
                            <div class="w-6 h-6 bg-orange-500/20 rounded-full flex items-center justify-center">
                                <i class="fas fa-store text-orange-400 text-xs"></i>
                            </div>
                            <span class="text-orange-400 text-xs font-bold uppercase tracking-wide">Seller Agent</span>
                            ${round ? `<span class="ml-auto px-2 py-0.5 bg-orange-500/20 rounded-full text-[10px] text-orange-300 font-mono">R${round}</span>` : ''}
                        </div>
                        <div class="text-sm text-gray-200 leading-relaxed">${message}</div>
                    </div>
                `;
            } else if (role === 'buyer') {
                bubble.className += ' flex justify-end';
                bubble.innerHTML = `
                    <div class="max-w-[80%] bg-gradient-to-br from-blue-500/10 to-blue-500/5 border border-blue-500/20 rounded-2xl rounded-tr-sm p-5">
                        <div class="flex items-center justify-end gap-2 mb-3">
                            ${round ? `<span class="mr-auto px-2 py-0.5 bg-blue-500/20 rounded-full text-[10px] text-blue-300 font-mono">R${round}</span>` : ''}
                            <span class="text-blue-400 text-xs font-bold uppercase tracking-wide">Buyer Agent</span>
                            <div class="w-6 h-6 bg-blue-500/20 rounded-full flex items-center justify-center">
                                <i class="fas fa-user text-blue-400 text-xs"></i>
                            </div>
                        </div>
                        <div class="text-sm text-gray-200 leading-relaxed text-right">${message}</div>
                    </div>
                `;
            } else {
                // System message
                bubble.className += ' flex justify-center';
                bubble.innerHTML = `
                    <div class="px-4 py-2 bg-accent/10 border border-accent/30 rounded-full text-xs text-accent font-mono uppercase tracking-wide">${message}</div>
                `;
            }

            chatContainer.appendChild(bubble);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function showJudge(judge) {
            if (!judge) return;
            judgeSection.classList.remove('hidden');

            const verdict = judge.verdict || 'UNKNOWN';
            const score = judge.score || 0;
            const summary = judge.summary || judge.reasoning || judge.explanation || 'No analysis available.';

            const verdictColors = {
                'EXCELLENT': 'text-green-400 bg-green-500/20',
                'GOOD': 'text-accent bg-accent/20',
                'FAIR': 'text-yellow-400 bg-yellow-500/20',
                'POOR': 'text-red-400 bg-red-500/20'
            };
            const verdictClass = verdictColors[verdict.toUpperCase()] || 'text-white bg-white/10';

            judgeContainer.innerHTML = `
                <div class="flex flex-col md:flex-row items-center justify-between gap-6 mb-6">
                    <div class="flex items-center gap-4">
                        <div class="w-16 h-16 rounded-2xl bg-accent/20 flex items-center justify-center text-3xl">
                            <i class="fas fa-gavel text-accent"></i>
                        </div>
                        <div>
                            <div class="text-xs text-gray-500 uppercase tracking-wider mb-1">Judge Verdict</div>
                            <div class="flex items-center gap-3">
                                <div class="text-3xl font-black text-white">${verdict}</div>
                                <div class="px-3 py-1 ${verdictClass} rounded-full text-xs font-bold">${score}/10</div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="border-t border-white/10 pt-6">
                    <div class="text-xs text-gray-500 uppercase tracking-wider mb-3">Detailed Analysis</div>
                    <div class="text-sm text-gray-300 leading-relaxed">${summary}</div>
                </div>
            `;
        }

        function showFinalDeal(product, link) {
            dealSection.classList.remove('hidden');

            const name = product.name || product.title || 'Unknown';
            const price = product.price || product.final_price || 0;
            const source = product.source || 'web';

            dealContainer.innerHTML = `
                <div class="inline-flex items-center gap-2 px-4 py-2 bg-accent/20 rounded-full mb-6">
                    <i class="fas fa-check-circle text-accent"></i>
                    <span class="text-xs uppercase tracking-widest text-accent font-bold">Negotiation Complete</span>
                </div>
                <div class="mb-4">
                    <div class="text-xs text-gray-500 uppercase tracking-wider mb-2">Final Price</div>
                    <div class="text-6xl md:text-7xl font-black text-white mb-2">Rs.${price.toLocaleString()}</div>
                </div>
                <div class="text-gray-300 text-lg mb-2 max-w-2xl mx-auto">${name}</div>
                <div class="text-xs text-gray-500 mb-8">from <span class="text-accent uppercase">${source}</span></div>
                <a href="${link}" target="_blank" class="inline-flex items-center gap-3 px-12 py-5 bg-accent text-black font-bold text-lg rounded-full hover:scale-105 transition-all shadow-[0_0_40px_rgba(204,255,0,0.4)] hover:shadow-[0_0_60px_rgba(204,255,0,0.6)]">
                    <i class="fas fa-shopping-cart"></i>
                    SECURE THIS DEAL
                    <i class="fas fa-arrow-right"></i>
                </a>
            `;
        }

        async function startStream(products, query, budget) {
            const response = await fetch('/negotiate_stream', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ products, query, budget })
            });
            const reader = response.body.getReader();
            const decoder = new TextDecoder();

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                const chunk = decoder.decode(value);
                const lines = chunk.split('\n');

                lines.forEach(line => {
                    if (line.startsWith('data: ')) {
                        try {
                            const event = JSON.parse(line.slice(6));

                            if (event.type === 'init') {
                                addChat('system', `Buyer's pick: ${event.buyer_choice}`);
                            }

                            else if (event.type === 'message') {
                                addChat(event.role, event.message, event.round);
                            }

                            else if (event.type === 'switch') {
                                addChat('system', `Buyer convinced! Switching to: ${event.new_product}`);
                            }

                            else if (event.type === 'status') {
                                addChat('system', event.message);
                            }

                            else if (event.type === 'complete') {
                                const fc = event.final_choice || {};
                                const link = fc.url || '#';

                                // Show Judge
                                showJudge(event.judge_analysis);

                                // Show Final Deal
                                showFinalDeal(fc, link);

                                addChat('system', 'Process complete!');
                            }

                            else if (event.type === 'error') {
                                addChat('system', `Error: ${event.message}`);
                            }

                        } catch (e) { console.error('Parse error:', e); }
                    }
                });
            }
        }
    </script>
</body>
